<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحدي التغذية والمعادن</title>

<style>

body{
    font-family:Tahoma;
    margin:0;
    padding:20px;
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

/* الكارد الرئيسي */
.container{
    width:100%;
    max-width:750px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius:25px;
    padding:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
    animation:fadeIn 0.5s ease;
}

/* العنوان الكبير */
h1{
    text-align:center;
    font-size:28px;
    margin-bottom:15px;
}

/* الأقسام */
.section-title{
    text-align:center;
    font-size:16px;
    margin-bottom:10px;
    color:#facc15;
    font-weight:bold;
}

/* شريط الأقسام */
.sections-bar{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
}

.section-pill{
    padding:6px 12px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    font-size:13px;
    opacity:0.6;
}

.section-pill.active{
    background:#22c55e;
    opacity:1;
}

/* شريط التقدم */
.progress{
    height:8px;
    background:rgba(255,255,255,0.2);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:15px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(to right,#00f5a0,#00d9f5);
    transition:0.4s;
}

/* السؤال */
.question{
    font-size:22px;
    margin:15px 0;
    line-height:1.6;
}

/* الخيارات */
.option{
    background:rgba(255,255,255,0.1);
    padding:14px;
    margin:10px 0;
    border-radius:15px;
    cursor:pointer;
    transition:0.25s;
}

.option:hover{
    transform:scale(1.02);
    background:#2563eb;
}

/* الصح والخطأ */
.correct{
    background:#16a34a !important;
    animation:pop 0.3s ease;
}

.wrong{
    background:#dc2626 !important;
    animation:shake 0.3s ease;
}

/* أنيميشن */
@keyframes pop{
    0%{transform:scale(0.8);}
    100%{transform:scale(1);}
}

@keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
}

/* التلميح والشرح */
.info-box{
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    line-height:1.7;
}

/* زر التالي */
.next-btn{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:15px;
    background:linear-gradient(to right,#00c6ff,#0072ff);
    color:white;
    font-size:18px;
    cursor:pointer;
    display:none;
    transition:0.3s;
}

.next-btn:hover{
    transform:scale(1.03);
}

/* توقيع العمل */
.footer{
    text-align:center;
    margin-top:20px;
    font-size:14px;
    color:#cbd5e1;
    opacity:0.8;
}

</style>
</head>

<body>

<div class="container">

<h1>🧠 تحدي التغذية والمعادن</h1>

<div class="section-title" id="sectionTitle"></div>

<div class="sections-bar">
<div class="section-pill" id="s1">1</div>
<div class="section-pill" id="s2">2</div>
<div class="section-pill" id="s3">3</div>
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="question" id="question"></div>

<div id="options"></div>

<div id="info"></div>

<button class="next-btn" id="nextBtn">التالي</button>

<div class="footer">
هذا العمل خاص بـ <b>Dr. Reema</b> 💙
</div>

</div>

<script>

let quizData = [

{section:1, question:"كيف يتم تصنيف المعادن الرئيسية؟", hint:"100mg+", options:["أكثر","أقل","سامة","غير مهمة"], correct:0, explanation:"المعادن الرئيسية تحتاج أكثر من 100mg يومياً."},

{section:1, question:"السبانخ ضعيف بالكالسيوم؟", hint:"حمض", options:["د","أكساليك","ملح","سكر"], correct:1, explanation:"حمض الأكساليك يمنع الامتصاص."},

{section:1, question:"ما يزيد امتصاص الحديد؟", hint:"فيتامين", options:["A","B","C","D"], correct:2, explanation:"فيتامين C."},

{section:2, question:"وظيفة الحديد؟", hint:"دم", options:["أكسجين","هضم","نوم","سكر"], correct:0, explanation:"نقل الأكسجين."},

{section:2, question:"أهم معدن للعظام؟", hint:"Ca", options:["Na","Ca","K","Fe"], correct:1, explanation:"الكالسيوم."},

{section:3, question:"أفضل مصدر فيتامين C؟", hint:"حمضيات", options:["برتقال","خبز","لحم","أرز"], correct:0, explanation:"البرتقال."}

];

let current=0;
let score=0;
let answered=false;

const sectionTitle=document.getElementById("sectionTitle");
const question=document.getElementById("question");
const options=document.getElementById("options");
const info=document.getElementById("info");
const nextBtn=document.getElementById("nextBtn");
const progressBar=document.getElementById("progressBar");

function updateSections(sec){
document.querySelectorAll(".section-pill").forEach(p=>p.classList.remove("active"));
document.getElementById("s"+sec).classList.add("active");
}

function load(){

answered=false;
info.innerHTML="";
nextBtn.style.display="none";

let q=quizData[current];

sectionTitle.innerText="📌 القسم "+q.section;

updateSections(q.section);

question.innerText=(current+1)+". "+q.question;

options.innerHTML="";

progressBar.style.width=((current+1)/quizData.length*100)+"%";

q.options.forEach((opt,i)=>{

let div=document.createElement("div");
div.className="option";
div.innerText=opt;

div.onclick=()=>select(i,div);

options.appendChild(div);

});

}

function select(i,el){

if(answered)return;
answered=true;

let q=quizData[current];
let all=document.querySelectorAll(".option");

let correct=i===q.correct;

if(correct){
el.classList.add("correct");
score++;
}else{
el.classList.add("wrong");
all[q.correct].classList.add("correct");
}

all.forEach(a=>a.style.pointerEvents="none");

info.innerHTML=`
<div class="info-box">
💡 <b>تلميح:</b> ${q.hint}<br><br>
📘 <b>شرح:</b> ${q.explanation}
</div>
`;

nextBtn.style.display="block";

}

nextBtn.onclick=()=>{

current++;

if(current<quizData.length){
load();
}else{
document.querySelector(".container").innerHTML=`
<h1>🎉 انتهى الاختبار</h1>
<h2>نتيجتك: ${score}/${quizData.length}</h2>
<div class="footer">هذا العمل خاص بـ <b>Dr. Reema</b> 💙</div>
`;
}

};

load();

</script>

</body>
</html>
