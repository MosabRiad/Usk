<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحدي التغذية والمعادن</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Tahoma;
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
}

.quiz-container{
    width:100%;
    max-width:700px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    padding:30px;
    color:white;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
    animation:fadeIn 0.7s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    text-align:center;
    margin-bottom:20px;
    font-size:28px;
}

.progress-container{
    width:100%;
    height:12px;
    background:rgba(255,255,255,0.2);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(to right,#00f5a0,#00d9f5);
    transition:0.4s;
}

.question{
    font-size:24px;
    line-height:1.7;
    margin-bottom:15px;
    animation:fadeIn 0.5s;
}

.hint{
    color:#cbd5e1;
    margin-bottom:20px;
}

.options{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.option-btn{
    background:rgba(255,255,255,0.1);
    border:2px solid rgba(255,255,255,0.2);
    color:white;
    padding:16px;
    border-radius:15px;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;
}

.option-btn:hover{
    transform:scale(1.02);
    background:#2563eb;
}

.correct{
    background:#16a34a !important;
    border-color:#22c55e;
}

.wrong{
    background:#dc2626 !important;
    border-color:#ef4444;
}

.explanation{
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    display:none;
    line-height:1.8;
    color:#f8fafc;
}

.next-btn,
.restart-btn{
    margin-top:25px;
    width:100%;
    border:none;
    padding:15px;
    border-radius:15px;
    background:linear-gradient(to right,#00c6ff,#0072ff);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    display:none;
}

.next-btn:hover,
.restart-btn:hover{
    transform:scale(1.03);
}

.result-box{
    text-align:center;
    display:none;
}

.score{
    font-size:30px;
    margin-bottom:15px;
}

.high-score{
    margin-top:10px;
    color:#facc15;
    font-size:18px;
}

</style>
</head>

<body>

<div class="quiz-container">

<h1>🧠 تحدي التغذية والمعادن</h1>

<div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div id="quizBox">

<div class="hint" id="hint"></div>

<div class="question" id="question"></div>

<div class="options" id="options"></div>

<div class="explanation" id="explanation"></div>

<button class="next-btn" id="nextBtn">
السؤال التالي
</button>

</div>

<div class="result-box" id="resultBox">

<div class="score" id="scoreText"></div>

<div class="high-score" id="highScore"></div>

<button class="restart-btn" id="restartBtn">
إعادة الاختبار
</button>

</div>

</div>

<script>

let quizData = [

{
question:"كيف يتم تصنيف المعادن الرئيسية مقارنة بالمعادن النزرة؟",
hint:"الحد الفاصل هو 100 ملغ يومياً",
options:[
"أكثر من 100 ملغ يومياً",
"أقل من 100 ملغ يومياً",
"فقط الكالسيوم والحديد",
"معادن سامة"
],
correct:0,
explanation:"المعادن الرئيسية يحتاجها الجسم بكميات تتجاوز 100 ملغ يومياً مثل الكالسيوم والبوتاسيوم."
},

{
question:"لماذا لا يعتبر السبانخ مصدراً ممتازاً للكالسيوم؟",
hint:"يوجد حمض يعيق الامتصاص",
options:[
"يفتقر لفيتامين د",
"الكالسيوم يتلف بالطبخ",
"يحتوي على حمض الأكساليك",
"يطرد الكالسيوم"
],
correct:2,
explanation:"حمض الأكساليك يرتبط بالكالسيوم ويقلل امتصاصه داخل الجسم."
},

{
question:"ما العنصر الذي يساعد على امتصاص الحديد؟",
hint:"فيتامين مشهور بالحمضيات",
options:[
"حمض الفيتيك",
"الكالسيوم",
"البوليفينول",
"فيتامين C"
],
correct:3,
explanation:"فيتامين C يزيد امتصاص الحديد خاصة الحديد النباتي."
}

];

function shuffle(array){
    return array.sort(()=>Math.random()-0.5);
}

quizData = shuffle(quizData);

let currentQuestion = 0;
let score = 0;
let answered = false;

const question = document.getElementById("question");
const hint = document.getElementById("hint");
const options = document.getElementById("options");
const explanation = document.getElementById("explanation");
const nextBtn = document.getElementById("nextBtn");
const progressBar = document.getElementById("progressBar");

const resultBox = document.getElementById("resultBox");
const scoreText = document.getElementById("scoreText");
const highScoreText = document.getElementById("highScore");

function loadQuestion(){

answered = false;

nextBtn.style.display="none";
explanation.style.display="none";

let q = quizData[currentQuestion];

question.innerHTML = `${currentQuestion+1}. ${q.question}`;

hint.innerHTML = `💡 ${q.hint}`;

options.innerHTML = "";

progressBar.style.width =
`${((currentQuestion + 1)/quizData.length)*100}%`;

q.options.forEach((option,index)=>{

const btn = document.createElement("button");

btn.classList.add("option-btn");

btn.innerText = option;

btn.onclick = ()=>selectAnswer(index,btn);

options.appendChild(btn);

});

}

function selectAnswer(index,btn){

if(answered) return;

answered = true;

const q = quizData[currentQuestion];

const buttons = document.querySelectorAll(".option-btn");

if(index === q.correct){

btn.classList.add("correct");

score++;

}else{

btn.classList.add("wrong");

buttons[q.correct].classList.add("correct");

}

buttons.forEach(b=>{
b.style.pointerEvents="none";
});

explanation.style.display="block";

explanation.innerHTML =
`✅ ${q.explanation}`;

nextBtn.style.display="block";

}

nextBtn.onclick = ()=>{

currentQuestion++;

if(currentQuestion < quizData.length){

loadQuestion();

}else{

showResult();

}

};

function showResult(){

document.getElementById("quizBox").style.display="none";

resultBox.style.display="block";

let percentage =
Math.round((score/quizData.length)*100);

scoreText.innerHTML =
`🎉 نتيجتك ${score} / ${quizData.length}<br>${percentage}%`;

let best =
localStorage.getItem("bestScore") || 0;

if(score > best){

localStorage.setItem("bestScore",score);

best = score;

}

highScoreText.innerHTML =
`🏆 أعلى نتيجة: ${best}`;

document.getElementById("restartBtn")
.style.display="block";

}

document.getElementById("restartBtn")
.onclick = ()=>{

location.reload();

};

loadQuestion();

</script>

</body>
</html>
