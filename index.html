<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحدي التغذية والمعادن</title>

<style>

body{
    font-family:Tahoma;
    margin:0;
    padding:20px;
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.container{
    width:100%;
    max-width:750px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius:25px;
    padding:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

h1{text-align:center;}

.question{font-size:22px;margin:15px 0;}

.option{
    background:rgba(255,255,255,0.1);
    padding:14px;
    margin:10px 0;
    border-radius:15px;
    cursor:pointer;
}

.option:hover{background:#2563eb;}

.correct{background:#16a34a !important;}
.wrong{background:#dc2626 !important;}

.next-btn{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:15px;
    background:linear-gradient(to right,#00c6ff,#0072ff);
    color:white;
    font-size:18px;
    display:none;
    cursor:pointer;
}

.info-box{
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
}

</style>
</head>

<body>

<div class="container">

<h1>🧠 تحدي التغذية والمعادن</h1>

<div class="question" id="question"></div>

<div id="options"></div>

<div id="info"></div>

<button class="next-btn" id="nextBtn">التالي</button>

</div>

<script>

/* =========================
   BANK OF QUESTIONS
========================= */

let questionBank = [
{question:"ما هي نسبة المعادن من الجسم؟", hint:"صغيرة جداً", options:["4%","10%","20%","1%"], correct:0, explanation:"4% فقط"},

{question:"أي معدن رئيسي؟", hint:"للعظام", options:["حديد","كالسيوم","زنك","يود"], correct:1, explanation:"الكالسيوم"},

{question:"فيتامين امتصاص الكالسيوم؟", hint:"الشمس", options:["A","B","C","D"], correct:3, explanation:"فيتامين D"},

{question:"مكان تخزين الكالسيوم؟", hint:"العظام", options:["دم","عضلات","عظام","كبد"], correct:2, explanation:"العظام"},

{question:"الهيموغلوبين؟", hint:"الدم", options:["إنسولين","هيموغلوبين","كولاجين","ألبومين"], correct:1, explanation:"ينقل الأكسجين"},

{question:"نقص الحديد؟", hint:"دم", options:["سكري","أنيميا","ضغط","سمنة"], correct:1, explanation:"فقر الدم"},

{question:"اليود؟", hint:"الغدة", options:["كالسيوم","يود","زنك","حديد"], correct:1, explanation:"هرمونات الغدة"},

{question:"الزنك؟", hint:"مناعة", options:["زنك","حديد","صوديوم","بوتاسيوم"], correct:0, explanation:"المناعة"},

{question:"الصوديوم يوجد في؟", hint:"خارج الخلايا", options:["داخل الخلايا","خارج الخلايا","العظام","العضلات"], correct:1, explanation:"ECF"},

{question:"البوتاسيوم يوجد في؟", hint:"داخل الخلايا", options:["داخل الخلايا","خارج الخلايا","الدم","العظم"], correct:0, explanation:"ICF"},

{question:"الفلورايد يحمي؟", hint:"الأسنان", options:["العظام","الأسنان","الدم","الكبد"], correct:1, explanation:"المينا"},

{question:"نقص الكالسيوم يسبب؟", hint:"عظام لينة", options:["سكري","كساح","ضغط","أنيميا"], correct:1, explanation:"Rickets"},

{question:"اليود في الملح؟", hint:"مدعم", options:["ملح عادي","ملح مدعم","سكر","ماء"], correct:1, explanation:"iodized salt"},

{question:"السيلينيوم؟", hint:"مضاد أكسدة", options:["نحاس","سيلينيوم","حديد","كالسيوم"], correct:1, explanation:"Antioxidant"},

{question:"المغنيسيوم؟", hint:"إنزيمات", options:["تنشيط إنزيمات","سكر","دهون","أكسجين"], correct:0, explanation:"+300 إنزيم"}
];

/* =========================
   CREATE RANDOM QUIZ (30)
========================= */

let quizData = [];

function shuffle(array){
    return array.sort(()=>Math.random()-0.5);
}

function generateQuiz(){
    let shuffled = shuffle([...questionBank]);
    quizData = shuffled.slice(0,30); // لو البنك أقل من 30 سيأخذ المتاح فقط
}

/* =========================
   STATE
========================= */

let current = 0;
let score = 0;
let answered = false;

const qEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const infoEl = document.getElementById("info");
const nextBtn = document.getElementById("nextBtn");

/* =========================
   LOAD QUESTION
========================= */

function load(){

answered = false;
infoEl.innerHTML="";
nextBtn.style.display="none";

let q = quizData[current];

qEl.innerText = (current+1) + ". " + q.question;

optionsEl.innerHTML="";

q.options.forEach((opt,i)=>{
    let div = document.createElement("div");
    div.className="option";
    div.innerText=opt;
    div.onclick=()=>select(i,div);
    optionsEl.appendChild(div);
});

}

/* =========================
   SELECT
========================= */

function select(i,el){

if(answered) return;
answered = true;

let q = quizData[current];
let all = document.querySelectorAll(".option");

let isCorrect = i === q.correct;

if(isCorrect){
    el.classList.add("correct");
    score++;
}else{
    el.classList.add("wrong");
    all[q.correct].classList.add("correct");
}

all.forEach(a=>a.style.pointerEvents="none");

infoEl.innerHTML = `
<div class="info-box">
💡 ${q.hint}<br><br>
📘 ${q.explanation}
</div>
`;

nextBtn.style.display="block";

}

/* =========================
   NEXT
========================= */

nextBtn.onclick = ()=>{

current++;

if(current < quizData.length){
    load();
}else{
    showResults();
}

};

/* =========================
   RESULTS
========================= */

function showResults(){

let percent = (score / quizData.length) * 100;

let level =
percent >= 80 ? "ممتاز 🎉" :
percent >= 50 ? "جيد 👍" :
"يحتاج تحسين 📚";

document.querySelector(".container").innerHTML = `

<h1>🎉 انتهى الاختبار</h1>

<h2>النتيجة: ${score} / ${quizData.length}</h2>

<h3>${level}</h3>

<p>النسبة: ${percent.toFixed(1)}%</p>

<p style="text-align:center;color:#cbd5e1;margin-top:20px">
هذا العمل خاص بـ <b>Dr. Reema</b> 💙
</p>

`;

}

/* =========================
   START
========================= */

generateQuiz();
load();

</script>

</body>
</html>
