<!DOCTYPE html> <html lang="ar" dir="rtl"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>ماراثون المعادن والتغذية</title>  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">  <style>  *{ margin:0; padding:0; box-sizing:border-box; }  body{ font-family:'Cairo',sans-serif; background:linear-gradient(135deg,#eef2ff,#ffffff,#dbeafe); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }  .quiz-container{ width:100%; max-width:850px; background:#fff; border-radius:30px; overflow:hidden; box-shadow:0 10px 40px rgba(0,0,0,0.1); }  .header{ background:#4f46e5; color:#fff; padding:25px; display:flex; justify-content:space-between; align-items:center; }  .header h1{ font-size:28px; font-weight:900; }  .timer{ background:#3730a3; padding:10px 18px; border-radius:50px; font-size:22px; font-weight:bold; }  .content{ padding:35px; }  .start-screen, .result-screen{ text-align:center; }  .start-btn, .next-btn, .restart-btn{ width:100%; border:none; padding:18px; border-radius:16px; background:#4f46e5; color:#fff; font-size:20px; font-weight:bold; cursor:pointer; transition:.3s; margin-top:20px; }  .start-btn:hover, .next-btn:hover, .restart-btn:hover{ transform:translateY(-3px); background:#4338ca; }  .question{ font-size:28px; font-weight:800; margin-bottom:30px; line-height:1.7; color:#0f172a; }  .options{ display:grid; gap:15px; }  .option{ padding:18px; border:2px solid #e5e7eb; border-radius:18px; cursor:pointer; transition:.3s; font-size:18px; background:#fff; text-align:right; }  .option:hover{ border-color:#4f46e5; background:#eef2ff; transform:translateY(-2px); }  .correct{ background:#dcfce7 !important; border-color:#22c55e !important; color:#166534; }  .wrong{ background:#fee2e2 !important; border-color:#ef4444 !important; color:#991b1b; }  .progress{ width:100%; height:10px; background:#e5e7eb; border-radius:20px; overflow:hidden; margin-bottom:25px; }  .progress-bar{ height:100%; background:#4f46e5; width:0%; transition:.3s; }  .info{ display:flex; justify-content:space-between; margin-bottom:10px; color:#64748b; font-weight:bold; }  .explanation{ margin-top:20px; background:#eff6ff; padding:18px; border-right:5px solid #3b82f6; border-radius:12px; display:none; line-height:1.8; }  .result-score{ font-size:60px; font-weight:900; color:#4f46e5; margin:20px 0; }  .footer{ text-align:center; padding:20px; background:#f8fafc; color:#94a3b8; font-size:14px; }  .hidden{ display:none; }  @media(max-width:768px){  .question{ font-size:22px; }  .header{ flex-direction:column; gap:15px; text-align:center; }  }  </style> </head> <body>  <div class="quiz-container">  <div class="header">  <div> <h1>ماراثون المعادن والتغذية</h1> <p>30 سؤالاً في 5 دقائق</p> </div>  <div class="timer" id="timer">5:00</div>  </div>  <div class="content">  <!-- START SCREEN -->  <div class="start-screen" id="startScreen">  <h2 style="font-size:38px;margin-bottom:20px;"> هل أنت مستعد؟ 🔥 </h2>  <p style="color:#64748b;font-size:18px;margin-bottom:30px;"> اختبر معلوماتك في المعادن والتغذية </p>  <button class="start-btn" onclick="startQuiz()"> ابدأ الاختبار الآن </button>  </div>  <!-- QUIZ SCREEN -->  <div class="quiz-screen hidden" id="quizScreen">  <div class="info"> <span id="questionCount"></span> <span id="score"></span> </div>  <div class="progress"> <div class="progress-bar" id="progressBar"></div> </div>  <div class="question" id="question"></div>  <div class="options" id="options"></div>  <div class="explanation" id="explanation"></div>  <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()"> السؤال التالي → </button>  </div>  <!-- RESULT SCREEN -->  <div class="result-screen hidden" id="resultScreen">  <h2 style="font-size:42px;"> انتهى الاختبار 🎉 </h2>  <div class="result-score" id="finalScore"></div>  <p id="resultMessage" style="font-size:24px;margin-bottom:30px;"></p>  <button class="restart-btn" onclick="location.reload()"> إعادة المحاولة </button>  </div>  </div>  <div class="footer"> تم تطوير اللعبة التعليمية © 2026 </div>  </div>  <script>  const QUESTIONS = [  { question:"ما هي النسبة المئوية التقريبية التي تشكلها المعادن من وزن جسم الإنسان؟", options:["1%","4%","10%","20%"], correct:1, explanation:"تشكل المعادن حوالي 4% من وزن الجسم." },  { question:"كيف يتم تعريف المعادن الرئيسية؟", options:[ "التي يحتاجها الجسم بكمية تزيد عن 100 ملغ يومياً", "التي يحتاجها الجسم بكمية أقل من 100 ملغ يومياً", "التي توجد في اللحوم فقط", "التي لا يحتاجها الجسم يومياً" ], correct:0, explanation:"المعادن الرئيسية هي التي يحتاجها الجسم بكميات كبيرة." },  { question:"أين يتم تخزين 99% من الكالسيوم؟", options:[ "في الكبد", "في العضلات", "في العظام والأسنان", "في الدم" ], correct:2, explanation:"99% من الكالسيوم موجود في العظام والأسنان." },  { question:"ما الفيتامين المهم لامتصاص الكالسيوم؟", options:[ "فيتامين C", "فيتامين D", "فيتامين A", "فيتامين B12" ], correct:1, explanation:"فيتامين D ضروري لامتصاص الكالسيوم." },  { question:"أي معدن يعتبر الشريك الرئيسي للكالسيوم؟", options:[ "الصوديوم", "الفوسفور", "اليود", "البوتاسيوم" ], correct:1, explanation:"الفوسفور مهم مع الكالسيوم لبناء العظام." },  { question:"ما المعدن المسؤول عن السوائل داخل الخلايا؟", options:[ "الصوديوم", "البوتاسيوم", "الحديد", "الكلوريد" ], correct:1, explanation:"البوتاسيوم هو الأيون الرئيسي داخل الخلايا." },  { question:"ما الحد الأعلى للصوديوم يومياً؟", options:[ "1000 ملغ", "1500 ملغ", "2300 ملغ", "5000 ملغ" ], correct:2, explanation:"الحد الأعلى الموصى به هو 2300 ملغ." },  { question:"لماذا السبانخ ليس مصدراً جيداً للكالسيوم؟", options:[ "حمض الأكساليك", "نقص فيتامين سي", "الألياف", "نوع الكالسيوم" ], correct:0, explanation:"حمض الأكساليك يمنع امتصاص الكالسيوم." },  { question:"ما وظيفة المغنيسيوم الأساسية؟", options:[ "نقل الأكسجين", "تنظيم الغدة", "تنشيط الإنزيمات", "تخثر الدم" ], correct:2, explanation:"المغنيسيوم يشارك في مئات التفاعلات الحيوية." },  { question:"أي نوع من الحديد يوجد في اللحوم؟", options:[ "غير الهيمي", "الهيمي", "أكسيد الحديد", "الحديد الفيروزي" ], correct:1, explanation:"الحديد الهيمي يُمتص بشكل أفضل." },  { question:"ما نتيجة نقص اليود؟", options:[ "الكساح", "تضخم الغدة الدرقية", "فقر الدم", "هشاشة العظام" ], correct:1, explanation:"نقص اليود يسبب تضخم الغدة الدرقية." },  { question:"أي معدن مسؤول عن التذوق؟", options:[ "النحاس", "الفلورايد", "الزنك", "الكروم" ], correct:2, explanation:"الزنك مهم للتذوق والتئام الجروح." },  { question:"ما وظيفة السيلينيوم؟", options:[ "بناء العظام", "مضاد أكسدة", "تكوين الحمض", "نقل الأكسجين" ], correct:1, explanation:"السيلينيوم مضاد قوي للأكسدة." },  { question:"ما اسم تلون الأسنان بسبب الفلورايد؟", options:[ "تسوس", "فلوروزس", "تآكل اللثة", "سقوط الأسنان" ], correct:1, explanation:"الفلوروزس ينتج عن زيادة الفلورايد." },  { question:"أي معدن يدخل في تركيب B12؟", options:[ "الحديد", "الكوبالت", "الزنك", "المنجنيز" ], correct:1, explanation:"فيتامين B12 يحتوي على الكوبالت." },  { question:"ما البروتين الذي يخزن الأكسجين بالعضلات؟", options:[ "الهيموغلوبين", "الميوغلوبين", "الألبومين", "الكولاجين" ], correct:1, explanation:"الميوغلوبين يخزن الأكسجين في العضلات." },  { question:"كم تحتاج الحامل من الحديد؟", options:[ "8 ملغ", "15 ملغ", "27 ملغ", "45 ملغ" ], correct:2, explanation:"الحامل تحتاج 27 ملغ يومياً." },  { question:"ما الأيون السالب الرئيسي خارج الخلية؟", options:[ "الفوسفات", "الكلوريد", "الكبريتات", "البوتاسيوم" ], correct:1, explanation:"الكلوريد هو الأيون السالب الرئيسي." },  { question:"أي غدة تفرز PTH؟", options:[ "النخامية", "الكظرية", "جارات الدرقية", "البنكرياس" ], correct:2, explanation:"جارات الدرقية تنظم الكالسيوم." },  { question:"ما وظيفة الكبريت؟", options:[ "ضربات القلب", "الأحماض الأمينية", "حماية الأسنان", "تكوين الدم" ], correct:1, explanation:"الكبريت يدخل في تركيب الأحماض الأمينية." },  { question:"أي معدن يساعد الأنسولين؟", options:[ "الزنك", "الكروم", "الحديد", "اليود" ], correct:1, explanation:"الكروم يساعد عمل الأنسولين." },  { question:"ما خطورة ارتفاع البوتاسيوم؟", options:[ "فشل كلوي", "توقف القلب", "تسوس الأسنان", "زيادة الوزن" ], correct:1, explanation:"ارتفاع البوتاسيوم قد يسبب توقف القلب." },  { question:"ما الذي يحسن امتصاص الحديد النباتي؟", options:[ "الشاي", "فيتامين سي", "القهوة", "مضادات الحموضة" ], correct:1, explanation:"فيتامين C يزيد امتصاص الحديد." },  { question:"ما المرض الناتج عن تراكم الحديد؟", options:[ "الأنيميا", "داء ترسب الأصبغة", "الجويتر", "الكساح" ], correct:1, explanation:"يسبب تراكم الحديد بشكل سام." },  { question:"أي معدن يساعد إزالة السموم؟", options:[ "الموليبدينوم", "الصوديوم", "الكالسيوم", "الحديد" ], correct:0, explanation:"الموليبدينوم يدخل بإنزيمات إزالة السموم." },  { question:"ما فائدة تدعيم الملح باليود؟", options:[ "تحسين الطعم", "الوقاية من الجويتر", "رخص السعر", "حماية الأسنان" ], correct:1, explanation:"يمنع نقص اليود." },  { question:"أي معدن يفقد بالعرق؟", options:[ "الكالسيوم", "الصوديوم", "الحديد", "الفلورايد" ], correct:1, explanation:"الصوديوم يفقد بكثرة مع التعرق." },  { question:"أي معدن يقوي الشعر والأظافر؟", options:[ "البوتاسيوم", "الكبريت", "الصوديوم", "الكلوريد" ], correct:1, explanation:"الكبريت يقوي الكيراتين." },  { question:"ما وظيفة النحاس بالأوعية؟", options:[ "رفع الضغط", "بناء الكولاجين", "منع التجلط", "تخزين الدهون" ], correct:1, explanation:"النحاس ضروري لمرونة الأوعية." },  { question:"كم كمية الفلورايد الموصى بها للرجال؟", options:[ "1 ملغ", "4 ملغ", "10 ملغ", "100 ملغ" ], correct:1, explanation:"الكمية الموصى بها 4 ملغ." }  ];  let currentQuestion = 0; let score = 0; let timer = 300; let interval;  function startQuiz(){  document.getElementById('startScreen').classList.add('hidden'); document.getElementById('quizScreen').classList.remove('hidden');  loadQuestion();  interval = setInterval(() => {  timer--;  let mins = Math.floor(timer / 60); let secs = timer % 60;  document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;  if(timer <= 0){ finishQuiz(); }  },1000);  }  function loadQuestion(){  const q = QUESTIONS[currentQuestion];  document.getElementById('question').innerText = q.question;  document.getElementById('questionCount').innerText = `السؤال ${currentQuestion + 1} / ${QUESTIONS.length}`;  document.getElementById('score').innerText = `النتيجة: ${score}`;  document.getElementById('progressBar').style.width = `${((currentQuestion + 1) / QUESTIONS.length) * 100}%`;  const optionsDiv = document.getElementById('options');  optionsDiv.innerHTML = "";  q.options.forEach((option,index)=>{  const btn = document.createElement('button');  btn.classList.add('option');  btn.innerText = option;  btn.onclick = ()=>selectAnswer(index);  optionsDiv.appendChild(btn);  });  document.getElementById('explanation').style.display = "none";  document.getElementById('nextBtn').classList.add('hidden');  }  function selectAnswer(index){  const q = QUESTIONS[currentQuestion];  const buttons = document.querySelectorAll('.option');  buttons.forEach((btn,i)=>{  btn.disabled = true;  if(i === q.correct){ btn.classList.add('correct'); } else if(i === index){ btn.classList.add('wrong'); }  });  if(index === q.correct){ score++; }  const explanation = document.getElementById('explanation');  explanation.style.display = "block";  explanation.innerText = q.explanation;  document.getElementById('nextBtn').classList.remove('hidden');  }  function nextQuestion(){  currentQuestion++;  if(currentQuestion < QUESTIONS.length){ loadQuestion(); } else{ finishQuiz(); }  }  function finishQuiz(){  clearInterval(interval);  document.getElementById('quizScreen').classList.add('hidden');  document.getElementById('resultScreen').classList.remove('hidden');  document.getElementById('finalScore').innerText = `${score} / ${QUESTIONS.length}`;  let msg = "";  if(score >= 25){ msg = "أداء عبقري 🔥"; } else if(score >= 15){ msg = "أداء ممتاز 👏"; } else{ msg = "تحتاج مراجعة أكثر 📚"; }  document.getElementById('resultMessage').innerText = msg;  }  </script>  </body> </ html>
