<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار التغذية والمعادن</title>

<style>
body{
    font-family:Tahoma;
    margin:0;
    padding:20px;
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.container{
    width:100%;
    max-width:750px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    border-radius:25px;
    padding:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

h1{text-align:center;}

.section-pill{
    padding:6px 12px;
    border-radius:20px;
    background:rgba(255,255,255,0.1);
    font-size:13px;
}

.section-pill.active{background:#22c55e;}

.progress{height:8px;background:rgba(255,255,255,0.2);border-radius:20px;overflow:hidden;margin-bottom:15px;}
.progress-bar{height:100%;width:0%;background:linear-gradient(to right,#00f5a0,#00d9f5);}

.question{font-size:22px;margin:15px 0;}

.option{
    background:rgba(255,255,255,0.1);
    padding:14px;
    margin:10px 0;
    border-radius:15px;
    cursor:pointer;
}

.option:hover{background:#2563eb;}

.correct{background:#16a34a !important;}
.wrong{background:#dc2626 !important;}

.next-btn{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:15px;
    background:linear-gradient(to right,#00c6ff,#0072ff);
    color:white;
    font-size:18px;
    display:none;
    cursor:pointer;
}

.info-box{
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
}

</style>
</head>

<body>

<div class="container">

<h1>🧠 تحدي التغذية والمعادن</h1>

<div class="question" id="question"></div>

<div id="options"></div>

<div id="info"></div>

<button class="next-btn" id="nextBtn">التالي</button>

</div>

<script>

/* =========================
   DATA
========================= */

let quizData = [

// Major Minerals
{section:1, question:"ما هي نسبة المعادن من الجسم؟", hint:"صغيرة جداً", options:["4%","10%","20%","1%"], correct:0, explanation:"4% فقط"},

{section:1, question:"أي معدن رئيسي؟", hint:"للعظام", options:["حديد","كالسيوم","زنك","يود"], correct:1, explanation:"الكالسيوم"},

{section:1, question:"احتياج الكالسيوم؟", hint:"1000", options:["500","1000","1500","2000"], correct:1, explanation:"1000mg"},

{section:1, question:"فيتامين امتصاص الكالسيوم؟", hint:"الشمس", options:["A","B","C","D"], correct:3, explanation:"D"},

{section:1, question:"مكان تخزين الكالسيوم؟", hint:"العظام", options:["دم","عضلات","عظام","كبد"], correct:2, explanation:"العظام"},

// Trace
{section:2, question:"الهيموغلوبين؟", hint:"الدم", options:["إنسولين","هيموغلوبين","كولاجين","ألبومين"], correct:1, explanation:"ينقل الأكسجين"},

{section:2, question:"نقص الحديد؟", hint:"دم", options:["سكري","أنيميا","ضغط","سمنة"], correct:1, explanation:"فقر الدم"},

{section:2, question:"اليود؟", hint:"الغدة", options:["كالسيوم","يود","زنك","حديد"], correct:1, explanation:"الهرمونات"},

{section:2, question:"الزنك؟", hint:"مناعة", options:["زنك","حديد","صوديوم","بوتاسيوم"], correct:0, explanation:"المناعة"}

];

/* =========================
   STATE
========================= */

let current = 0;
let score = 0;
let answered = false;

let sectionStats = {
    1:{correct:0,total:0},
    2:{correct:0,total:0}
};

const qEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const infoEl = document.getElementById("info");
const nextBtn = document.getElementById("nextBtn");

/* =========================
   LOAD QUESTION
========================= */

function load(){
    answered = false;
    infoEl.innerHTML="";
    nextBtn.style.display="none";

    let q = quizData[current];

    qEl.innerText = (current+1) + ". " + q.question;

    optionsEl.innerHTML="";

    q.options.forEach((opt,i)=>{
        let div = document.createElement("div");
        div.className="option";
        div.innerText=opt;
        div.onclick=()=>select(i,div);
        optionsEl.appendChild(div);
    });
}

/* =========================
   SELECT ANSWER
========================= */

function select(i,el){

if(answered) return;
answered = true;

let q = quizData[current];
let all = document.querySelectorAll(".option");

let isCorrect = i === q.correct;

sectionStats[q.section].total++;

if(isCorrect){
    el.classList.add("correct");
    score++;
    sectionStats[q.section].correct++;
}else{
    el.classList.add("wrong");
    all[q.correct].classList.add("correct");
}

all.forEach(a=>a.style.pointerEvents="none");

infoEl.innerHTML = `
<div class="info-box">
💡 ${q.hint}<br><br>
📘 ${q.explanation}
</div>
`;

nextBtn.style.display="block";

}

/* =========================
   NEXT
========================= */

nextBtn.onclick = ()=>{

current++;

if(current < quizData.length){
    load();
}else{
    showResults();
}

};

/* =========================
   ANALYTICS PAGE
========================= */

function showResults(){

let percent = (score / quizData.length) * 100;

let level = percent >= 80 ? "ممتاز 🎉" :
            percent >= 50 ? "جيد 👍" :
            "يحتاج تحسين 📚";

document.querySelector(".container").innerHTML = `

<h1>🎉 انتهى الاختبار</h1>

<h2>النتيجة: ${score} / ${quizData.length}</h2>

<h3>${level}</h3>

<hr>

<h3>📊 تحليل الأداء</h3>

<p>🔹 القسم 1: ${sectionStats[1].correct}/${sectionStats[1].total}</p>
<p>🔹 القسم 2: ${sectionStats[2].correct}/${sectionStats[2].total}</p>

<hr>

<p style="text-align:center;color:#cbd5e1">
هذا العمل خاص بـ <b>Dr. Reema</b> 💙
</p>

`;

}

load();

</script>

</body>
</html>
